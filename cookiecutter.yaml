about:
  description: Ocean models and reanalysis products&mdash;including regional systems such as ROMS and MOM6, global ocean reanalyses such as GLORYS, regional products such as MOM6-COBALT-NEP, and climate projections from CMIP6&mdash;are transforming our ability to study changing ocean and fisheries habitats across the globe. These products provide rich three-dimensional information about ocean temperature, oxygen, currents, mixed layer depth, and ecosystem conditions that can be used to investigate marine heatwaves, habitat compression, climate-driven range shifts, and changing ecosystem dynamics. In the OM-Fish HackWeek, you will learn to access, visualize, and analyze ocean model outputs using modern open-source Python workflows and apply these tools to fisheries and ocean ecosystem applications.<br><br>Hackweeks are participant-driven events that strive to create welcoming spaces for participants to learn new things, build community, and gain hands-on experience with collaboration and team science. During OM-Fish HackWeek, we will have a combination of science lectures, coding tutorials, and group projects (pitched by participants) focused on working with ocean reanalysis, forecast, ecosystem, and climate model datasets.
